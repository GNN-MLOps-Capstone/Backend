services:
  news-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: news-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL?DATABASE_URL is required}
      - DEBUG=false
      - CORS_ORIGINS=http://localhost:3000,http://localhost:51151,http://localhost:*
    restart: unless-stopped
    networks:
      - capstone-network

networks:
  capstone-network:
    driver: bridge