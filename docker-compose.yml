services:
  news-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: news-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL?DATABASE_URL is required}
      - DEBUG=false
      - CORS_ORIGINS=http://localhost:3000,http://localhost:51151,http://localhost:*
    restart: unless-stopped
    networks:
      - crawling_news-network
      - proxy-net

networks:
  crawling_news-network:
    external: true
    name: crawling_news-network
  proxy-net:
    external: true
    name: proxy-net
